version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sms-server
    restart: unless-stopped
    ports:
      - "5000:5000"       # expose for direct API access during dev/debug
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    networks:
      - sms-network

  # ── Frontend (React + Nginx) ─────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sms-client
    restart: unless-stopped
    ports:
      - "80:80"           # app accessible at http://localhost
    depends_on:
      - server
    networks:
      - sms-network

# ── Shared Network ───────────────────────────────────────────────────
networks:
  sms-network:
    driver: bridge
